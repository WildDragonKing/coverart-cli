# Single auto-merge workflow for ALL PRs (human + Dependabot).
# Branch protection is still the gate — auto-merge only fires once everything is green.
#
# Use a PAT or GitHub App token in AUTOMERGE_TOKEN. Do not fall back to
# GITHUB_TOKEN here: merges performed by workflow-created GITHUB_TOKEN events do
# not reliably trigger follow-up push workflows, including Release Please.
name: Auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

env:
  GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN }}
  PR_URL: ${{ github.event.pull_request.html_url }}

jobs:
  automerge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Skip when AUTOMERGE_TOKEN is unavailable
        if: ${{ env.GH_TOKEN == '' }}
        run: echo "AUTOMERGE_TOKEN is not configured; leaving this PR for manual merge."
      - name: Enable squash auto-merge
        if: ${{ env.GH_TOKEN != '' }}
        run: gh pr merge --auto --squash "$PR_URL"
