name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: pyrefly check
      - name: Unit + integration tests
        run: pytest --cov=coverart_cli --cov-report=term-missing

  smoke:
    name: smoke (install wheel + run end-to-end)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build wheel
        run: |
          python -m pip install --disable-pip-version-check build==1.5.1
          python -m build --wheel
      - name: Install wheel into a fresh venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --disable-pip-version-check dist/*.whl
      - name: Verify CLI is installed
        run: |
          /tmp/smoke-venv/bin/coverart --version
          /tmp/smoke-venv/bin/coverart --help > /dev/null
      - name: Build a fixture library
        # Use the smoke-venv python so we can import mutagen (installed as a dep of coverart-cli).
        run: |
          /tmp/smoke-venv/bin/python <<'PY'
          from pathlib import Path
          from mutagen.id3 import ID3, TPE1, TPE2, TALB, TIT2
          p = Path("/tmp/fixture-lib/Pink Floyd/The Wall/01.mp3")
          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_bytes(b"\xff\xfb\x90\x00" + b"\x00" * 1000)
          tags = ID3()
          tags.add(TPE1(encoding=3, text=["Pink Floyd"]))
          tags.add(TPE2(encoding=3, text=["Pink Floyd"]))
          tags.add(TALB(encoding=3, text=["The Wall"]))
          tags.add(TIT2(encoding=3, text=["Mother"]))
          tags.save(str(p))
          PY
      - name: Run end-to-end
        run: |
          /tmp/smoke-venv/bin/python <<'PY'
          from pathlib import Path

          from coverart_cli.core import RunOptions, run
          from coverart_cli.providers.base import CoverProvider, ProviderResult

          class FixtureProvider(CoverProvider):
              name = "fixture"
              user_agent = "coverart-cli-smoke/1.0"

              def fetch(self, artist, album):
                  return ProviderResult(
                      image_bytes=b"\xff\xd8\xff\xe0\x00\x10JFIF" + b"\x00" * 3000,
                      source=self.name,
                      image_url="fixture://cover.jpg",
                  )

          stats = run(RunOptions(root=Path("/tmp/fixture-lib"), providers=[FixtureProvider()]))
          assert stats.fetched_from == {"fixture": 1}
          assert stats.files_embedded == 1
          PY
          test -f "/tmp/fixture-lib/Pink Floyd/The Wall/cover.jpg" && echo "✓ cover.jpg written"
      - name: Generate HTML report against fixture
        run: |
          /tmp/smoke-venv/bin/coverart /tmp/fixture-lib --report-only --report-html /tmp/report.html
          test -s /tmp/report.html && echo "✓ report written ($(wc -c </tmp/report.html) bytes)"
