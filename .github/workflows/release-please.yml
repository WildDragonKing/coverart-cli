name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.release.tag_name }}

jobs:
  test:
    name: Release test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned development tools
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Verify tagged source
        run: |
          ruff check .
          pyrefly check
          pytest

  build:
    name: Build and verify release artifacts
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate tag and release metadata
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must be a stable semantic version such as v0.4.2."
            exit 1
          fi

          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Release tag is not reachable from main."
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          python - "$version" <<'PY'
          import sys
          import tomllib
          from pathlib import Path

          expected = sys.argv[1]
          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          actual = pyproject["project"]["version"]
          if actual != expected:
              raise SystemExit(f"pyproject version {actual!r} does not match tag {expected!r}")

          init = Path("src/coverart_cli/__init__.py").read_text()
          if f'__version__ = "{expected}"' not in init:
              raise SystemExit("__version__ does not match the release tag")

          changelog = Path("CHANGELOG.md").read_text()
          if f"## [{expected}]" not in changelog:
              raise SystemExit("CHANGELOG.md does not contain this release")
          PY
      - name: Build wheel and source distribution
        run: |
          python -m pip install --disable-pip-version-check build==1.5.1
          python -m build
      - name: Verify wheel installation
        run: |
          python -m venv /tmp/release-venv
          /tmp/release-venv/bin/pip install --disable-pip-version-check dist/*.whl
          version="${RELEASE_TAG#v}"
          test "$(/tmp/release-venv/bin/coverart --version)" = "coverart-cli $version"
          /tmp/release-venv/bin/coverart --help > /dev/null
      - name: Validate artifact set
        run: |
          test "$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l | tr -d ' ')" = "1"
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l | tr -d ' ')" = "1"
      - name: Store release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ env.RELEASE_TAG }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  attach:
    name: Attach artifacts to GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ env.RELEASE_TAG }}
          path: dist/
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"

  publish:
    name: Publish to PyPI
    needs: attach
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/coverart-cli/
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ env.RELEASE_TAG }}
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          attestations: true
