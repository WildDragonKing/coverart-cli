# CodeRabbit configuration for coverart-cli
# Docs: https://docs.coderabbit.ai/getting-started/configure-coderabbit

language: en-US
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches: [main]
  auto_apply_labels: true
  tools:
    # Lint/format autofix — CodeRabbit can commit suggestions automatically
    ruff:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true
  path_filters:
    - "!docs/screenshots/**"
    - "!**/*.md"
    - "!CHANGELOG.md"
    - "!.release-please-manifest.json"
  path_instructions:
    - path: "src/coverart_cli/providers/**"
      instructions: >
        Providers must inherit CoverProvider and call _http_get with retries.
        Reject placeholder images. Respect MIN_COVER_BYTES.
    - path: "src/coverart_cli/templates/**"
      instructions: >
        HTML templates must use safe DOM construction
        (createElement / textContent / replaceChildren),
        never innerHTML with non-escaped JSON.
    - path: "tests/**"
      instructions: Tests should be deterministic — use the FakeProvider, no real network.
    - path: ".github/workflows/**"
      instructions: >
        Always quote untrusted github.event.* inputs via env: not inline
        ${{ }} in run: blocks. Constrain manual dispatch refs to refs/tags/.

chat:
  auto_reply: true

code_generation:
  unit_tests:
    path_instructions:
      - path: "tests/**"
        instructions: Use FakeProvider, no real network calls, deterministic.

knowledge_base:
  learnings:
    scope: auto
